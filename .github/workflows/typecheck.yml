name: TypeScript Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Run tsc --noEmit
    runs-on: ubuntu-latest
    # NOTE: continue-on-error allows merging even when type errors are
    # reported. This is intentional during the rollout phase: a follow-up
    # PR will fix the remaining latent errors (currently 18 in
    # ProductDetail.tsx, Header.tsx, ProductCard.tsx) and remove this flag
    # to make the check blocking.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
