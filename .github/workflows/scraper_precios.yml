name: Scraper de precios competencia

on:
  schedule:
    - cron: "0 9 1,15 * *"
  workflow_dispatch:

jobs:
  scraper-precios:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml
      - name: Crear directorio data
        run: mkdir -p scripts/data
      - name: Ejecutar scraper
        run: python scripts/scraper_precios.py
      - name: Commit resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/data/precios_competencia.json scripts/data/reporte_precios.md
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "chore: actualizar reporte de precios competencia"
            git push
          fi
      - name: Enviar reporte por email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: Reporte quincenal de precios competencia - eLights
          to: ventas@elights.cl
          from: GitHub Actions <${{ secrets.GMAIL_USER }}>
          body: |
            Hola,

            Se adjunta el reporte actualizado de precios de competidores.

            Saludos,
            Bot de monitoreo de precios eLights
          attachments: |
            scripts/data/reporte_precios.md
            scripts/data/precios_competencia.json
